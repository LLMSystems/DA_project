# Ofelia 排程設定（[加分題] 自動化排程）。
# 每次排程觸發時，以 doorplate-crawler 映像起一個新容器跑全量抓取，跑完即刪除。
# 產出的 DB / log 寫入同一組共用 volume，因此排程跑的結果一樣會被試題三監控與告警。

[job-run "doorplate-crawl"]
# 每日 02:00 執行（6 欄位 cron：秒 分 時 日 月 週）。
# 想在 demo 時看到效果，可改成例如：schedule = @every 5m
schedule = 0 0 2 * * *
image = doorplate-crawler:latest
# 共用 volume（名稱為「<專案名>_<volume名>」＝ doorplate_doorplate-*）。
volume = doorplate_doorplate-data:/data
volume = doorplate_doorplate-logs:/logs
# 排程跑全量（台北市各區）；demo 想縮短可加 --areas 大安區,中正區。
command = python main.py --captcha auto --headless --db-path /data/doorplate.sqlite3 --log-path /logs/crawler/crawler.log
# 跑完刪除容器，避免累積。
delete = true
