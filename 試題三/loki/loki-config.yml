# Loki 單體模式（檔案系統儲存），足夠本機 demo 與歷史查詢。
auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h   # 保留 7 天歷史，可查詢
  allow_structured_metadata: true

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
