<svg xmlns="http://www.w3.org/2000/svg" width="900" height="410" viewBox="0 0 900 410" role="img" aria-labelledby="title desc">
  <title id="title">灰階與 Otsu 二值化前後對比</title>
  <desc id="desc">同一張驗證碼處理前後對比：左側為原始驗證碼，右側為灰階加 Otsu 二值化後結果。</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#66706b" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #eef4f4; }
      .card { fill: #fffaf0; stroke: #d7e0df; stroke-width: 3; }
      .title { font: 800 34px "Microsoft JhengHei", "Noto Sans CJK TC", "PingFang TC", "Arial Unicode MS", sans-serif; fill: #1f2d2f; }
      .subtitle { font: 500 18px "Microsoft JhengHei", "Noto Sans CJK TC", "PingFang TC", "Arial Unicode MS", sans-serif; fill: #5d6968; }
      .label-left { font: 700 22px "Microsoft JhengHei", "Noto Sans CJK TC", "PingFang TC", "Arial Unicode MS", sans-serif; fill: #4a4640; }
      .label-right { font: 700 22px "Microsoft JhengHei", "Noto Sans CJK TC", "PingFang TC", "Arial Unicode MS", sans-serif; fill: #155b64; }
      .note { font: 500 17px "Microsoft JhengHei", "Noto Sans CJK TC", "PingFang TC", "Arial Unicode MS", sans-serif; fill: #596360; }
    </style>
  </defs>

  <rect class="bg" width="900" height="410"/>
  <text x="54" y="58" class="title">灰階 + Otsu 二值化前後對比</text>
  <text x="54" y="92" class="subtitle">同一張驗證碼，經過二值化後可降低背景雜訊並強化字元輪廓</text>

  <text x="54" y="143" class="label-left">處理前：原始驗證碼</text>
  <text x="482" y="143" class="label-right">處理後：灰階 + Otsu</text>

  <g filter="url(#softShadow)">
    <rect x="38" y="160" width="390" height="150" rx="6" class="card"/>
    <rect x="468" y="160" width="390" height="150" rx="6" class="card"/>
  </g>

  <image href="data:image/png;base64," x="58" y="183" width="350" height="104" preserveAspectRatio="xMidYMid meet"/>
  <image href="data:image/png;base64," x="488" y="183" width="350" height="104" preserveAspectRatio="xMidYMid meet"/>

  <text x="54" y="358" class="note">效果：背景干擾變少，文字筆畫更集中，OCR 較不容易被雜訊影響。</text>
</svg>
